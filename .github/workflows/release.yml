name: Release Artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Generate SBOM
        run: pnpm sbom --sbom-format cyclonedx --lockfile-only > sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
